# SPRING JPA CONFIG
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=1000
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.connection.provider_class=com.zaxxer.hikari.hibernate.HikariConnectionProvider
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.open-in-view=false
#server.port=8081

#server.address=192.168.0.155


# Maximum file size per file
spring.servlet.multipart.max-file-size=5MB

# Maximum request size (all files in a request)
spring.servlet.multipart.max-request-size=5MB

# CORS (Flutter Web / local dev)
app.cors.allowed-origin-patterns=http://localhost:*,https://localhost:*,http://127.0.0.1:*,https://127.0.0.1:*,http://10.0.2.2:*,http://10.0.3.2:*

# Firebase
firebase.credentials.path=classpath:serviceAccountKey.json

# SPRING DATASOURCE CONFIG
spring.datasource.url=jdbc:oracle:thin:@//localhost:1521/XEPDB1
spring.datasource.username=oracle_user
spring.datasource.password=oracle12345
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver


# SPRING MAIN CONFIG
spring.main.banner-mode=console
spring.banner.location=banner.txt


# ACTUATOR / MANAGEMENT ENDPOINTS
management.endpoints.web.exposure.include=health,info,metrics
management.endpoints.web.exposure.exclude=env,beans
management.endpoint.health.show-details=always
management.metrics.enable.jdbc=true

